services:
  web:
    container_name: ribuzz-preview
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        INTERNAL_ADMIN_API_KEY: ${INTERNAL_ADMIN_API_KEY}
        TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
        RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
        RATE_LIMIT_MAX_PUBLIC_REQUESTS: ${RATE_LIMIT_MAX_PUBLIC_REQUESTS}
        CTA_TRACK_RATE_LIMIT_MAX: ${CTA_TRACK_RATE_LIMIT_MAX}
        DIAGNOSTIC_DUPLICATE_WINDOW_HOURS: ${DIAGNOSTIC_DUPLICATE_WINDOW_HOURS}
    env_file:
      - .env
    ports:
      - "3000:3000"
